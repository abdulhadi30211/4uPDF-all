<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scan physical documents to PDF using your device camera. Auto-crop, enhance and save as PDF. Free browser tool.">
    <title>PDF Scanner – Scan Documents to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/scanner" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23f59e0b'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #f59e0b; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(15, 23, 42, 0.8); display: flex; flex-direction: column; align-items: center; }
        
        .btn-capture { width: 70px; height: 70px; border-radius: 50%; border: 4px solid white; background: transparent; cursor: pointer; position: relative; }
        .btn-capture::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: white; border-radius: 50%; }
        
        .thumbs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; width: 100%; padding-bottom: 10px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 2px solid transparent; flex-shrink: 0; }
        
        .btn { padding: 10px 20px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">4uPDF-all</a>
        <div>Scanner</div>
    </header>

    <video id="video" autoplay playsinline></video>

    <div class="controls" id="controls">
        <div class="thumbs" id="thumbList"></div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <button class="btn" onclick="openCamera()" id="startBtn">Start Camera</button>
            <button class="btn-capture" onclick="takePhoto()" id="snapBtn" style="display:none"></button>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const { PDFDocument } = PDFLib;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const thumbList = document.getElementById('thumbList');
        const startBtn = document.getElementById('startBtn');
        const snapBtn = document.getElementById('snapBtn');
        
        let stream = null;
        let photos = [];

        async function openCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                snapBtn.style.display = 'block';
            } catch(err) {
                alert("Camera access denied.");
            }
        }

        function takePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            photos.push(dataUrl);
            
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'thumb';
            thumbList.appendChild(img);
            thumbList.scrollLeft = thumbList.scrollWidth;
        }

        async function savePdf() {
            if(photos.length === 0) return;
            
            const pdfDoc = await PDFDocument.create();
            
            for(const dataUrl of photos) {
                const imgBytes = await fetch(dataUrl).then(res => res.arrayBuffer());
                const img = await pdfDoc.embedJpg(imgBytes);
                const page = pdfDoc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }
            
            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, "scanned.pdf");
        }
        
        // Hook up Save button to the snapBtn context or add a separate save button
        // For demo: Double click snap button to save? Or add a "Done" button.
        // Let's add a done button dynamically or reuse startBtn
        document.querySelector('.controls').innerHTML += `<button class="btn" style="background:#16a34a; color:white; display:none" id="doneBtn" onclick="savePdf()">Done</button>`;
        const doneBtn = document.getElementById('doneBtn');
        
        // Show Done button after first photo
        const oldTakePhoto = takePhoto;
        takePhoto = () => {
            oldTakePhoto();
            doneBtn.style.display = 'inline-block';
        }
        
        function download(data, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
