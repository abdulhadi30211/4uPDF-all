<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert PDF pages to high-quality JPG or PNG images. Extract every page as an image. Free, browser-based, no uploads.">
    <title>PDF to Image Converter – Convert PDF Pages to JPG/PNG | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-to-image" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23ec4899'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #ec4899; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: var(--bg-card); }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        
        .container { padding: 20px; }
        .upload-box { border: 2px dashed var(--border); padding: 40px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        
        .settings { background: var(--bg-card); padding: 15px; border-radius: 8px; margin: 20px auto; max-width: 800px; display: none; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center; }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .thumb-box { position: relative; border-radius: 6px; overflow: hidden; border: 2px solid transparent; cursor: pointer; }
        .thumb-box.selected { border-color: var(--accent); }
        .thumb-box img { width: 100%; height: 140px; object-fit: cover; background: white; }
        .badge { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 0; text-align: center; }
        
        .btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">4uPDF-all</a><div>PDF to Image Studio</div></header>
    <div class="container">
        <div class="upload-box" id="dropZone"><h2>PDF to Images</h2><input type="file" id="fileInput" accept=".pdf"></div>
        
        <div class="settings" id="settings">
            <div><label>DPI:</label><select id="dpi"><option value="1">72 (Screen)</option><option value="2">150</option><option value="3" selected>300 (Print)</option><option value="5">600 (HD)</option></select></div>
            <div><label>Format:</label><select id="format"><option value="jpeg">JPG</option><option value="png">PNG</option></select></div>
            <div style="margin-left:auto;">
                <button class="btn" onclick="convert()">Download Selected</button>
            </div>
        </div>
        
        <div class="grid" id="grid"></div>
    </div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const grid = document.getElementById('grid');
        const settings = document.getElementById('settings');
        
        let pdfDoc = null;
        let selectedPages = new Set();

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            dropZone.style.display = 'none';
            settings.style.display = 'flex';
            
            // Select all by default
            for(let i=1; i<=pdfDoc.numPages; i++) selectedPages.add(i);
            
            renderThumbs();
        }

        async function renderThumbs() {
            grid.innerHTML = '';
            for(let i=1; i<=pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                const div = document.createElement('div');
                div.className = 'thumb-box' + (selectedPages.has(i) ? ' selected' : '');
                div.innerHTML = `<img src="${canvas.toDataURL()}"><span class="badge">Page ${i}</span>`;
                div.onclick = () => {
                    if(selectedPages.has(i)) selectedPages.delete(i); else selectedPages.add(i);
                    div.classList.toggle('selected');
                };
                grid.appendChild(div);
            }
        }

        async function convert() {
            const scale = parseInt(document.getElementById('dpi').value);
            const format = document.getElementById('format').value;
            const zip = new JSZip();
            
            for(const pageNum of selectedPages) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                const dataUrl = canvas.toDataURL(`image/${format}`, 0.95);
                zip.file(`page_${pageNum}.${format}`, dataUrl.split(',')[1], {base64: true});
            }
            
            const content = await zip.generateAsync({type: 'blob'});
            download(content, "images.zip");
        }

        function download(blob, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
