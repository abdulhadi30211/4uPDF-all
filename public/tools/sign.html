    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;
        
        // State
        let pdfDoc = null;
        let pdfBytes = null;
        let currentPageNum = 1;
        let currentSignature = null;
        let signatureFields = [];
        let scale = 1.0;
        
        // Canvas setup
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let penColor = '#000000';
        let selectedFont = 'Dancing Script';
        let textColor = '#000000';
        
        // Initialize canvas
        function initCanvas() {
            const rect = drawCanvas.getBoundingClientRect();
            drawCanvas.width = rect.width * 2;
            drawCanvas.height = rect.height * 2;
            drawCtx.scale(2, 2);
            drawCtx.strokeStyle = penColor;
            drawCtx.lineWidth = 2;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            // Clear with white background
            drawCtx.fillStyle = 'white';
            drawCtx.fillRect(0, 0, drawCanvas.width / 2, drawCanvas.height / 2);
        }
        
        setTimeout(initCanvas, 100);
        window.addEventListener('resize', initCanvas);
        
        // Drawing functionality
        ['mousedown', 'touchstart'].forEach(evt => 
            drawCanvas.addEventListener(evt, (e) => {
                isDrawing = true;
                [lastX, lastY] = getCoords(e);
            })
        );
        
        ['mousemove', 'touchmove'].forEach(evt => 
            drawCanvas.addEventListener(evt, (e) => {
                if (!isDrawing) return;
                const [x, y] = getCoords(e);
                drawCtx.beginPath();
                drawCtx.moveTo(lastX, lastY);
                drawCtx.lineTo(x, y);
                drawCtx.stroke();
                [lastX, lastY] = [x, y];
            })
        );
        
        ['mouseup', 'touchend', 'mouseleave'].forEach(evt => 
            drawCanvas.addEventListener(evt, () => isDrawing = false)
        );
        
        function getCoords(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return [(clientX - rect.left), (clientY - rect.top)];
        }
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(`${tab}Tab`).classList.add('active');
            });
        });
        
        // Color picker
        document.querySelectorAll('#colorPicker .color-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('#colorPicker .color-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                penColor = this.dataset.color;
                drawCtx.strokeStyle = penColor;
            });
        });
        
        document.querySelectorAll('#textColorPicker .color-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('#textColorPicker .color-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                textColor = this.dataset.color;
            });
        });
        
        // Font selection
        document.querySelectorAll('.font-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.font-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedFont = this.dataset.font;
            });
        });
        
        // File upload
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            if (e.target.files.length > 0) {
                await loadPDF(e.target.files[0]);
            }
        };
        
        // Drag and drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });
        
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                loadPDF(files[0]);
            }
        });
        
        async function loadPDF(file) {
            try {
                console.log('Loading PDF:', file.name, 'Size:', file.size, 'Type:', file.type);
                
                const arrayBuffer = await file.arrayBuffer();
                pdfBytes = new Uint8Array(arrayBuffer);
                
                // Validate PDF file
                if (pdfBytes.length < 5) {
                    throw new Error('File is too small to be a valid PDF (minimum 5 bytes required)');
                }
                
                // Check for PDF header (%PDF)
                const header = String.fromCharCode.apply(null, pdfBytes.slice(0, 5));
                console.log('PDF Header check:', header);
                
                if (!header.startsWith('%PDF')) {
                    throw new Error('Invalid PDF file - missing PDF header (%PDF). The file may be corrupted or not a PDF.');
                }
                
                console.log('✓ Valid PDF detected, size:', pdfBytes.length, 'bytes');
                
                // Try to load with PDF.js first
                let loadingTask;
                try {
                    loadingTask = pdfjsLib.getDocument({ 
                        data: arrayBuffer,
                        useSystemFonts: true,
                        disableFontFace: false
                    });
                    pdfDoc = await loadingTask.promise;
                    console.log('✓ PDF.js loaded successfully, pages:', pdfDoc.numPages);
                } catch (loadError) {
                    console.error('PDF.js loading failed:', loadError);
                    throw new Error('Failed to load PDF for viewing: ' + loadError.message + '. The file may be corrupted or password-protected.');
                }
                
                // Verify PDF can be loaded by PDF-Lib (needed for signing)
                try {
                    const testDoc = await PDFDocument.load(arrayBuffer);
                    console.log('✓ PDF-Lib validation successful, pages:', testDoc.getPageCount());
                } catch (libError) {
                    console.error('PDF-Lib validation failed:', libError);
                    throw new Error('PDF cannot be modified: ' + libError.message + '. The PDF may be encrypted, corrupted, or read-only.');
                }
                
                document.getElementById('uploadOverlay').classList.add('hidden');
                document.getElementById('pdfWrapper').style.display = 'block';
                document.getElementById('pageNav').style.display = 'flex';
                document.getElementById('totalPages').textContent = pdfDoc.numPages;
                
                await renderPage(currentPageNum);
                
                // Show success message
                const successMsg = `✅ PDF loaded successfully!\n\n` +
                                  `📊 File Info:\n` +
                                  `- Name: ${file.name}\n` +
                                  `- Size: ${(file.size / 1024).toFixed(2)} KB\n` +
                                  `- Pages: ${pdfDoc.numPages}\n\n` +
                                  `You can now add signatures!`;
                alert(successMsg);
                
            } catch (error) {
                console.error('❌ Error loading PDF:', error);
                console.error('Error stack:', error.stack);
                
                let errorMsg = 'Error loading PDF\n\n';
                errorMsg += 'Details: ' + error.message + '\n\n';
                
                if (error.message.includes('header') || error.message.includes('corrupted')) {
                    errorMsg += '⚠️ This usually means:\n';
                    errorMsg += '• The file is not a valid PDF\n';
                    errorMsg += '• The file is corrupted\n';
                    errorMsg += '• The file was not downloaded completely\n\n';
                    errorMsg += 'Please try:\n';
                    errorMsg += '1. Using a different PDF file\n';
                    errorMsg += '2. Re-downloading the PDF\n';
                    errorMsg += '3. Opening the PDF in a reader first to verify it works';
                } else if (error.message.includes('encrypted') || error.message.includes('password')) {
                    errorMsg += '⚠️ This PDF appears to be encrypted or password-protected.\n';
                    errorMsg += 'Please remove the password protection and try again.';
                } else if (error.message.includes('size')) {
                    errorMsg += '⚠️ The file is too small to be a valid PDF.\n';
                    errorMsg += 'Please ensure you selected a proper PDF file.';
                }
                
                alert(errorMsg);
                
                // Keep upload overlay visible so user can try again
                document.getElementById('uploadOverlay').classList.remove('hidden');
            }
        }
        
        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.getElementById('pdfCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            await page.render({ canvasContext: ctx, viewport }).promise;
            
            document.getElementById('currentPage').textContent = pageNum;
            document.getElementById('prevPage').disabled = pageNum <= 1;
            document.getElementById('nextPage').disabled = pageNum >= pdfDoc.numPages;
            
            // Update signature field positions
            updateSignatureFields();
        }
        
        function changePage(delta) {
            const newPage = currentPageNum + delta;
            if (newPage >= 1 && newPage <= pdfDoc.numPages) {
                currentPageNum = newPage;
                renderPage(newPage);
            }
        }
        
        function clearSignature() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
        
        function useSignature() {
            // Check if canvas is empty
            const imageData = drawCtx.getImageData(0, 0, drawCanvas.width / 2, drawCanvas.height / 2);
            const isEmpty = !imageData.data.some(channel => channel !== 0 && channel !== 255);
            
            if (isEmpty) {
                alert('Please draw your signature first');
                return;
            }
            
            const dataUrl = drawCanvas.toDataURL('image/png');
            console.log('Drawn signature created, data length:', dataUrl.length);
            currentSignature = { type: 'draw', data: dataUrl };
            addSignatureField(dataUrl);
        }
        
        function generateTypedSignature() {
            const text = document.getElementById('signatureText').value;
            if (!text.trim()) {
                alert('Please enter your name');
                return;
            }
            
            console.log('Generating typed signature:', text, 'with font:', selectedFont);
            
            // Create canvas for typed signature
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 150;
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = textColor;
            ctx.font = `bold 60px ${selectedFont}`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const dataUrl = canvas.toDataURL('image/png');
            console.log('Typed signature created, data length:', dataUrl.length);
            currentSignature = { type: 'typed', data: dataUrl, text: text, font: selectedFont };
            addSignatureField(dataUrl);
        }
        
        // Signature upload
        const signatureUpload = document.getElementById('signatureUpload');
        const sigFileInput = document.getElementById('sigFileInput');
        
        signatureUpload.onclick = () => sigFileInput.click();
        
        sigFileInput.onchange = async (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('previewImg').src = event.target.result;
                    document.getElementById('uploadedPreview').style.display = 'block';
                    currentSignature = { type: 'uploaded', data: event.target.result };
                };
                reader.readAsDataURL(file);
            }
        };
        
        function useUploadedSignature() {
            if (currentSignature && currentSignature.data) {
                console.log('Uploaded signature used, data length:', currentSignature.data.length);
                addSignatureField(currentSignature.data);
            } else {
                alert('Please upload a signature image first');
            }
        }
        
        function addSignatureField(imageData) {
            const container = document.getElementById('signatureFields');
            const fieldId = Date.now();
            
            console.log('Adding signature field:', {
                id: fieldId,
                page: currentPageNum,
                imageDataLength: imageData.length,
                imageDataPreview: imageData.substring(0, 50) + '...'
            });
            
            const field = document.createElement('div');
            field.className = 'signature-field';
            field.id = `sig-${fieldId}`;
            field.style.left = '50%';
            field.style.top = '50%';
            
            // Create image element and verify it loads
            const img = document.createElement('img');
            img.src = imageData;
            img.onload = () => {
                console.log('Signature image loaded successfully:', img.width, 'x', img.height);
            };
            img.onerror = (err) => {
                console.error('Failed to load signature image:', err);
            };
            
            field.innerHTML = `
                <div style="position: relative; width: 100%; height: 100%;">
                </div>
                <div class="delete-btn" onclick="removeSignatureField('${fieldId}')">×</div>
            `;
            
            field.querySelector('div').appendChild(img);
            
            makeDraggable(field);
            container.appendChild(field);
            
            // Store signature data with validation
            signatureFields.push({ 
                id: fieldId, 
                page: currentPageNum, 
                imageData: imageData,
                type: currentSignature ? currentSignature.type : 'unknown'
            });
            
            console.log('Signature field added. Total signatures:', signatureFields.length);
        }
        
        function removeSignatureField(fieldId) {
            const field = document.getElementById(`sig-${fieldId}`);
            if (field) field.remove();
            signatureFields = signatureFields.filter(f => f.id != fieldId);
        }
        
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;
            el.ontouchstart = dragTouchStart;
            
            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }
            
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
            
            function dragTouchStart(e) {
                const touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementTouchDrag;
            }
            
            function elementTouchDrag(e) {
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }
        }
        
        function updateSignatureFields() {
            // Keep signature fields visible when changing pages
            document.querySelectorAll('.signature-field').forEach(field => {
                const sigData = signatureFields.find(f => `sig-${f.id}` === field.id);
                if (sigData && sigData.page !== currentPageNum) {
                    field.style.display = 'none';
                } else {
                    field.style.display = 'flex';
                }
            });
        }
        
        async function applySignatures() {
            if (!pdfBytes) {
                alert('Please load a PDF first');
                return;
            }
            
            if (signatureFields.length === 0) {
                alert('Please add at least one signature');
                return;
            }
            
            // Validate PDF bytes before attempting to apply signatures
            try {
                console.log('\n=== Validating PDF Before Signature Application ===');
                console.log('PDF bytes size:', pdfBytes.length);
                
                // Check PDF header again
                const header = String.fromCharCode.apply(null, pdfBytes.slice(0, 5));
                console.log('PDF Header check:', header);
                
                if (!header.startsWith('%PDF')) {
                    throw new Error('PDF data is corrupted - missing PDF header');
                }
                
                // Verify PDF can be loaded
                console.log('Loading PDF with PDF-Lib for final validation...');
                const testDoc = await PDFDocument.load(pdfBytes);
                console.log('✓ PDF validation successful, pages:', testDoc.getPageCount());
                
                console.log('=== Starting Signature Application Process ===');
                console.log('PDF bytes available:', pdfBytes ? 'yes' : 'no');
                console.log('Number of signatures:', signatureFields.length);
                
                const pdfLibDoc = await PDFDocument.load(pdfBytes);
                const pages = pdfLibDoc.getPages();
                
                console.log('PDF loaded, number of pages:', pages.length);
                
                let signaturesApplied = 0;
                
                for (const sigField of signatureFields) {
                    console.log('\nProcessing signature:', sigField.id);
                    console.log('Page:', sigField.page);
                    console.log('Image data length:', sigField.imageData.length);
                    
                    const page = pages[sigField.page - 1];
                    const { width, height } = page.getSize();
                    
                    console.log('Page dimensions:', width, 'x', height);
                    
                    const fieldEl = document.getElementById(`sig-${sigField.id}`);
                    if (!fieldEl) {
                        console.warn('Signature field element not found:', sigField.id);
                        continue;
                    }
                    
                    const canvas = document.getElementById('pdfCanvas');
                    const canvasRect = canvas.getBoundingClientRect();
                    const fieldRect = fieldEl.getBoundingClientRect();
                    
                    console.log('Canvas rect:', canvasRect);
                    console.log('Field rect:', fieldRect);
                    
                    // Calculate position relative to canvas
                    const xPercent = (fieldRect.left - canvasRect.left) / canvasRect.width;
                    const yPercent = (fieldRect.top - canvasRect.top) / canvasRect.height;
                    const wPercent = fieldRect.width / canvasRect.width;
                    const hPercent = fieldRect.height / canvasRect.height;
                    
                    console.log('Position percentages:', xPercent, yPercent, wPercent, hPercent);
                    
                    // Convert to PDF coordinates (origin is bottom-left)
                    const x = xPercent * width;
                    const y = height - (yPercent * height) - (hPercent * height);
                    const w = wPercent * width;
                    const h = hPercent * height;
                    
                    console.log('PDF coordinates:', x, y, w, h);
                    
                    // Convert image data URL to bytes and embed
                    try {
                        console.log('Fetching image data...');
                        const imgBytes = await fetch(sigField.imageData).then(res => res.arrayBuffer());
                        console.log('Image bytes size:', imgBytes.byteLength);
                        
                        let img;
                        try {
                            console.log('Attempting to embed as PNG...');
                            img = await pdfLibDoc.embedPng(imgBytes);
                            console.log('Successfully embedded as PNG');
                        } catch (pngError) {
                            console.log('PNG embedding failed, trying JPEG:', pngError.message);
                            try {
                                img = await pdfLibDoc.embedJpg(imgBytes);
                                console.log('Successfully embedded as JPEG');
                            } catch (jpgError) {
                                console.error('Both PNG and JPEG embedding failed:', jpgError.message);
                                throw new Error('Failed to embed signature image');
                            }
                        }
                        
                        console.log('Drawing image on page...');
                        page.drawImage(img, { x, y, width: w, height: h });
                        signaturesApplied++;
                        console.log('✓ Signature applied successfully');
                        
                    } catch (imgError) {
                        console.error('Error processing signature image:', imgError);
                        throw imgError;
                    }
                }
                
                console.log('\nSaving PDF document...');
                const signedPdfBytes = await pdfLibDoc.save();
                console.log('Signed PDF size:', signedPdfBytes.byteLength, 'bytes');
                
                // Show success message with detailed info
                const successMsg = `✅ Document signed successfully!\n\n` +
                                  `📊 Statistics:\n` +
                                  `- Pages: ${pdfLibDoc.getPageCount()}\n` +
                                  `- Signatures applied: ${signaturesApplied}/${signatureFields.length}\n` +
                                  `- Output size: ${(signedPdfBytes.byteLength / 1024).toFixed(2)} KB\n\n` +
                                  `Your signed PDF has been downloaded.`;
                
                alert(successMsg);
                
                download(signedPdfBytes, 'signed_document.pdf');
                
            } catch (error) {
                console.error('Error applying signatures:', error);
                const errorMsg = `❌ Error applying signatures\n\n` +
                               `Details: ${error.message}\n\n` +
                               `Please check the browser console for more information.`;
                alert(errorMsg);
            }
        }
        
        function download(data, filename) {
            const blob = new Blob([data], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Expose functions globally
        window.clearSignature = clearSignature;
        window.useSignature = useSignature;
        window.generateTypedSignature = generateTypedSignature;
        window.useUploadedSignature = useUploadedSignature;
        window.removeSignatureField = removeSignatureField;
        window.changePage = changePage;
        window.applySignatures = applySignatures;
    </script>
</body>
</html>
