<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add custom text or image watermarks to PDF files online. Control position, opacity and size. Free and browser-based.">
    <title>Watermark PDF – Add Text or Image Watermark Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/watermark" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23f43f5e'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #f43f5e; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 12px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--bg-card); padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .preview-area { flex: 1; background: #333; display: flex; align-items: center; justify-content: center; position: relative; }
        
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
        label { font-size: 12px; color: var(--muted); margin-top: 10px; display: block; }
        .btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; }
        
        #pdfCanvas { max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .watermark-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">4uPDF-all</a>
        <div>Watermark Studio</div>
    </header>

    <div class="main">
        <div class="sidebar">
            <label>Text</label>
            <input type="text" id="wmText" value="CONFIDENTIAL" oninput="renderPreview">
            
            <label>Font Size</label>
            <input type="range" id="wmSize" min="20" max="150" value="60" oninput="renderPreview">
            
            <label>Color</label>
            <input type="color" id="wmColor" value="#ff0000" oninput="renderPreview">
            
            <label>Opacity</label>
            <input type="range" id="wmOpacity" min="0" max="100" value="30" oninput="renderPreview">
            
            <label>Rotation</label>
            <select id="wmRotation" onchange="renderPreview">
                <option value="-45">Diagonal (-45°)</option>
                <option value="0">Horizontal</option>
                <option value="45">Diagonal (45°)</option>
                <option value="90">Vertical</option>
            </select>

            <label>Mode</label>
            <select id="wmMode" onchange="renderPreview">
                <option value="single">Single Center</option>
                <option value="tile">Tile (Repeat)</option>
            </select>

            <button class="btn" onclick="applyWatermark()">Apply to PDF</button>
            <input type="file" id="fileInput" accept=".pdf" hidden>
        </div>

        <div class="preview-area">
            <canvas id="pdfCanvas"></canvas>
            <div class="watermark-layer" id="wmLayer"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument, rgb, degrees } = PDFLib;

        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('pdfCanvas');
        const wmLayer = document.getElementById('wmLayer');
        
        let pdfBytes = null;
        let currentPageViewport = null;

        // Trigger file open immediately
        document.body.onload = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            pdfBytes = new Uint8Array(arrayBuffer);
            const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdfDoc.getPage(1);
            const viewport = page.getViewport({ scale: 1.0 });
            currentPageViewport = viewport;
            
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            
            renderPreview();
        }

        window.renderPreview = () => {
            const text = document.getElementById('wmText').value;
            const size = document.getElementById('wmSize').value;
            const color = document.getElementById('wmColor').value;
            const opacity = document.getElementById('wmOpacity').value / 100;
            const rotation = document.getElementById('wmRotation').value;
            const mode = document.getElementById('wmMode').value;

            const r = parseInt(color.slice(1, 3), 16) / 255;
            const g = parseInt(color.slice(3, 5), 16) / 255;
            const b = parseInt(color.slice(5, 7), 16) / 255;

            wmLayer.innerHTML = '';
            wmLayer.style.transform = `rotate(${rotation}deg)`;
            
            if (mode === 'single') {
                const div = document.createElement('div');
                div.innerText = text;
                div.style.cssText = `font-size:${size}px;color:rgba(${r*255},${g*255},${b*255},${opacity});font-family:sans-serif;font-weight:bold;text-transform:uppercase;`;
                wmLayer.appendChild(div);
            } else {
                // Tile logic
                const grid = document.createElement('div');
                grid.style.display = 'grid';
                grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
                grid.style.width = '150%';
                grid.style.height = '150%';
                grid.style.gap = '50px';
                for(let i=0; i<9; i++) {
                    const div = document.createElement('div');
                    div.innerText = text;
                    div.style.cssText = `font-size:${size}px;color:rgba(${r*255},${g*255},${b*255},${opacity});font-family:sans-serif;font-weight:bold;text-transform:uppercase;text-align:center;`;
                    grid.appendChild(div);
                }
                wmLayer.appendChild(grid);
            }
        };

        async function applyWatermark() {
            if(!pdfBytes) return alert("Load a PDF first");
            
            const text = document.getElementById('wmText').value;
            const size = parseInt(document.getElementById('wmSize').value);
            const color = document.getElementById('wmColor').value;
            const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
            const rotation = parseInt(document.getElementById('wmRotation').value);

            const r = parseInt(color.slice(1, 3), 16) / 255;
            const g = parseInt(color.slice(3, 5), 16) / 255;
            const b = parseInt(color.slice(5, 7), 16) / 255;

            const srcDoc = await PDFDocument.load(pdfBytes);
            const pages = srcDoc.getPages();
            const helvetica = await srcDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

            pages.forEach(page => {
                const { width, height } = page.getSize();
                page.drawText(text, {
                    x: width / 2,
                    y: height / 2,
                    font: helvetica,
                    size: size,
                    color: rgb(r, g, b),
                    opacity: opacity,
                    rotate: degrees(rotation),
                    // Centering offset calculation
                    x: width / 2 - (helvetica.widthOfTextAtSize(text, size) / 2),
                    y: height / 2,
                });
            });

            const pdfBytes = await srcDoc.save();
            download(pdfBytes, "watermarked.pdf");
        }

        function download(data, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
