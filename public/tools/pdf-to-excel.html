<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter – Convert PDF to XLSX Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-to-excel" />
    <meta name="description" content="Convert PDF tables and data to Excel XLSX spreadsheets online. Accurate extraction, editable output. Free, fast and secure.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%2316a34a'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #16a34a; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        .container { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .upload-box { border: 2px dashed var(--border); padding: 60px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 500px; text-align: center; }
        input { display: none; }
        pre { background: var(--bg-card); padding: 20px; border-radius: 12px; width: 100%; max-width: 800px; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 20px; color: #d1d5db; }
        .btn { margin-top: 20px; padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">Back to Home</a><div>PDF to Excel</div></header>
    <div class="container">
        <div class="upload-box" id="zone">
            <h1>Extract Tables to CSV</h1>
            <p style="color:var(--muted)">Opens in Microsoft Excel</p>
            <input type="file" id="input" accept=".pdf">
        </div>
        <pre id="out" style="display:none;"></pre>
        <button class="btn" id="dl" style="display:none;" onclick="dl()">Download CSV</button>
    </div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let csvContent = "";
        
        const zone = document.getElementById('zone');
        const input = document.getElementById('input');
        const out = document.getElementById('out');
        const dlBtn = document.getElementById('dl');

        zone.onclick = () => input.click();
        input.onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            out.style.display = 'block';
            out.textContent = "Scanning for tables...";
            
            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
            let fullText = "";

            // Extract Text
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                // Simple heuristic: group items by Y position to form rows
                const items = text.items;
                const rows = {};
                
                items.forEach(item => {
                    // Round Y to nearest 2 points to group lines
                    const y = Math.round(item.transform[5] / 2) * 2;
                    if(!rows[y]) rows[y] = [];
                    rows[y].push(item.str);
                });
                
                // Sort by Y descending (top to bottom)
                const sortedY = Object.keys(rows).sort((a,b) => b - a);
                
                sortedY.forEach(y => {
                    // Join items with commas (basic CSV)
                    const row = rows[y].map(cell => `"${cell}"`).join(",");
                    fullText += row + "\n";
                });
                fullText += "\n--- Page Break ---\n\n";
            }
            
            csvContent = fullText;
            out.textContent = fullText.substring(0, 2000) + "\n\n... (Preview Truncated)";
            dlBtn.style.display = 'inline-block';
        };

        function dl() {
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'extracted_data.csv';
            a.click();
        }
    </script>
</body>
</html>
