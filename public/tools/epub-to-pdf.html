<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB to PDF – Convert eBook to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/epub-to-pdf" />
    <meta name="description" content="Convert EPUB ebooks to PDF documents online. Maintain formatting and layout. Free, fast and 100% browser-based.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23a855f7'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #a855f7; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        .container { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .upload-box { border: 2px dashed var(--border); padding: 60px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 500px; }
        input { display: none; }
        #status { margin-top: 20px; color: var(--muted); }
        .btn { margin-top: 20px; padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; display: none; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">Back to Home</a><div>EPUB to PDF</div></header>
    <div class="container">
        <div class="upload-box" id="zone"><h1>Convert EPUB to PDF</h1><input type="file" id="input" accept=".epub"></div>
        <p id="status"></p>
        <button class="btn" id="dl" onclick="convert()">Convert to PDF</button>
    </div>
    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const zone = document.getElementById('zone');
        const input = document.getElementById('input');
        const status = document.getElementById('status');
        const dl = document.getElementById('dl');
        let epubContent = null;

        zone.onclick = () => input.click();
        input.onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            status.textContent = "Unzipping EPUB...";
            
            const zip = await JSZip.loadAsync(file);
            epubContent = zip;
            
            dl.style.display = 'inline-block';
            status.textContent = "EPUB loaded. Ready to convert.";
        };

        async function convert() {
            status.textContent = "Parsing contents...";
            
            // 1. Find the OPF file to determine reading order (simplified for demo)
            // Usually container.xml points to .opf, which lists html files.
            // We will just scan for HTML files in the zip for this demo.
            
            const doc = await PDFDocument.create();
            const font = await doc.embedFont(StandardFonts.Helvetica);
            
            let htmlFiles = [];
            epubContent.forEach((relativePath, file) => {
                if (relativePath.endsWith('.html') || relativePath.endsWith('.xhtml')) {
                    htmlFiles.push({ path: relativePath, file });
                }
            });

            // Sort by name (basic heuristic)
            htmlFiles.sort((a,b) => a.path.localeCompare(b.path));

            for(const item of htmlFiles) {
                const content = await item.file.async("text");
                
                // Simple HTML strip for text extraction
                const text = content.replace(/<[^>]*>?/gm, ' ').replace(/\s+/g, ' ');
                
                const page = doc.addPage([612, 792]);
                page.drawText(text.substring(0, 3000), { // Limit chars per page
                    x: 50, y: 750, size: 10, font, color: rgb(0,0,0), maxWidth: 512
                });
            }

            const bytes = await doc.save();
            download(bytes, "epub_converted.pdf");
            status.textContent = "Done!";
        }

        function download(data, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data])); a.download = name; a.click(); }
    </script>
</body>
</html>
