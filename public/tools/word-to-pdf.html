        .sidebar { width: 300px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }

<body>
    <header>
        <a href="index.html" class="logo">4uPDF-all</a>
        <div>Word to PDF Studio</div>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="upload-box" id="dropZone">
                <p style="font-size:14px">Select .docx file</p>
                <input type="file" id="fileInput" accept=".docx">
            </div>
            <div id="info" style="margin-top:20px; font-size:13px; color:var(--muted); display:none;">
                <p><strong>File:</strong> <span id="fileName">-</span></p>
                <p>Previewing converted content...</p>
            </div>
            <button class="btn" id="convertBtn" style="display:none" onclick="downloadPdf()">Download PDF</button>
        </div>
        
        <div class="preview-area">
            <div class="preview-content" id="renderArea">
                <h2 style="text-align:center; color:#999;">Your document preview will appear here</h2>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const renderArea = document.getElementById('renderArea');
        const convertBtn = document.getElementById('convertBtn');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if(!file.name.endsWith('.docx')) return alert('Only .docx supported');
            
            document.getElementById('info').style.display = 'block';
            document.getElementById('fileName').textContent = file.name;
            dropZone.style.display = 'none';

            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.convertToHtml({ arrayBuffer });
            
            renderArea.innerHTML = `
                <div style="text-align:center; margin-bottom:30px; border-bottom:1px solid #ccc; padding-bottom:10px;">
                    <h1>Word to PDF Converter</h1>
                </div>
                ${result.value}
            `;
            
            convertBtn.style.display = 'block';
        }

        async function downloadPdf() {
            const opt = {
                margin: 10, filename: 'converted.pdf', image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            await html2pdf().set(opt).from(renderArea).save();
        }
    </script>
</body>
