<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Overlay an image on top of a PDF page online. Control position, size and transparency. Free and browser-based.">
    <title>Overlay Image on PDF – Add Image Layer to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/overlay-image" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23f43f5e'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #f43f5e; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: var(--bg-card); padding: 30px; border-radius: 16px; text-align: center; }
        h2 { margin-top: 0; }
        .btn { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 5px; }
        input { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Image Overlay</h2>
        <p style="color:var(--muted); margin-bottom:20px;">Apply logo to all pages.</p>
        
        <div style="margin-bottom:20px;">
            <button class="btn" style="background:var(--border)" onclick="document.getElementById('imgInput').click()">1. Load Image</button>
            <button class="btn" style="background:var(--border)" onclick="document.getElementById('pdfInput').click()">2. Load PDF</button>
        </div>
        
        <input type="file" id="imgInput" accept="image/*">
        <input type="file" id="pdfInput" accept=".pdf">
        
        <button class="btn" id="processBtn" style="display:none" onclick="process()">Apply Overlay</button>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        const imgInput = document.getElementById('imgInput');
        const pdfInput = document.getElementById('pdfInput');
        const processBtn = document.getElementById('processBtn');
        
        let imgBytes = null, imgType = null;
        let pdfBytes = null;

        imgInput.onchange = async (e) => {
            const f = e.target.files[0];
            imgBytes = new Uint8Array(await f.arrayBuffer());
            imgType = f.type;
            checkReady();
        };
        
        pdfInput.onchange = async (e) => {
            pdfBytes = new Uint8Array(await e.target.files[0].arrayBuffer());
            checkReady();
        };

        function checkReady() {
            if(imgBytes && pdfBytes) processBtn.style.display = 'inline-block';
        }

        async function process() {
            const doc = await PDFDocument.load(pdfBytes);
            let img;
            if(imgType === 'image/png') img = await doc.embedPng(imgBytes);
            else img = await doc.embedJpg(imgBytes);
            
            const pages = doc.getPages();
            
            pages.forEach(page => {
                const { width, height } = page.getSize();
                // Place bottom-right
                const scale = 0.2; // 20% of page width
                const imgW = width * scale;
                const imgH = (img.height / img.width) * imgW;
                
                page.drawImage(img, {
                    x: width - imgW - 20,
                    y: 20,
                    width: imgW,
                    height: imgH
                });
            });
            
            const bytes = await doc.save();
            download(bytes, "overlay.pdf");
        }

        function download(data, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
