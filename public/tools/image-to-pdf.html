<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert JPG, PNG, WEBP and other images to PDF online. Combine multiple images into one PDF. Free, fast, no signup needed.">
    <title>Image to PDF Converter – JPG, PNG to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/image-to-pdf" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%238b5cf6'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #8b5cf6; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: var(--bg-card); }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        
        .main { display: flex; height: calc(100vh - 56px); }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .drop-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; font-size: 13px; color: var(--muted); }
        input { display: none; }
        
        label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
        select, input[type="number"] { width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .img-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; position: relative; cursor: move; border: 2px solid transparent; }
        .img-card:hover { border-color: var(--accent); }
        .img-card img { width: 100%; height: 120px; object-fit: cover; }
        .img-card .remove { position: absolute; top: 5px; right: 5px; background: #ef4444; color: white; border: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 260px; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 24px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">4uPDF-all</a>
        <div>Image to PDF Studio</div>
    </header>

    <div class="main">
        <div class="sidebar">
            <div class="drop-area" id="dropZone">
                <p>Drop Images</p>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>
            
            <div>
                <label>Page Size</label>
                <select id="pageSize">
                    <option value="fit">Fit (Auto)</option>
                    <option value="a4">A4 Portrait</option>
                    <option value="a4l">A4 Landscape</option>
                    <option value="letter">US Letter</option>
                </select>
            </div>
            
            <div>
                <label>Margins (px)</label>
                <input type="number" id="margin" value="0">
            </div>
        </div>

        <div class="content">
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <span id="count" style="font-size:13px; color:var(--muted)">0 images</span>
        <button class="btn btn-primary" onclick="generatePdf()">Create PDF</button>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const grid = document.getElementById('grid');
        
        let images = []; // { dataUrl, type, name }

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = e => { e.preventDefault(); };
        dropZone.ondrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = e => handleFiles(e.target.files);

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if(!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    images.push({ dataUrl: e.target.result, type: file.type, name: file.name });
                    render();
                };
                reader.readAsDataURL(file);
            });
        }

        function render() {
            grid.innerHTML = images.map((img, idx) => `
                <div class="img-card" draggable="true" data-idx="${idx}">
                    <img src="${img.dataUrl}">
                    <button class="remove" onclick="remove(${idx})">×</button>
                </div>
            `).join('');
            
            // Drag logic for reordering
            const cards = document.querySelectorAll('.img-card');
            cards.forEach(card => {
                card.ondragstart = e => { e.dataTransfer.setData("text/plain", card.dataset.idx); };
                card.ondragover = e => e.preventDefault();
                card.ondrop = e => {
                    e.preventDefault();
                    const from = parseInt(e.dataTransfer.getData("text/plain"));
                    const to = parseInt(card.dataset.idx);
                    const item = images.splice(from, 1)[0];
                    images.splice(to, 0, item);
                    render();
                };
            });

            document.getElementById('count').textContent = `${images.length} images`;
        }

        window.remove = (idx) => { images.splice(idx, 1); render(); };

        async function generatePdf() {
            if(images.length === 0) return alert("Add images first");
            
            const pdfDoc = await PDFDocument.create();
            const sizeOpt = document.getElementById('pageSize').value;
            const margin = parseInt(document.getElementById('margin').value) || 0;

            const sizes = {
                'a4': [595.28, 841.89], 'a4l': [841.89, 595.28],
                'letter': [612, 792], 'letterl': [792, 612]
            };

            for (const imgData of images) {
                let img;
                if (imgData.type === 'image/png') img = await pdfDoc.embedPng(imgData.dataUrl);
                else img = await pdfDoc.embedJpg(imgData.dataUrl);

                let pageW = img.width, pageH = img.height;
                if(sizeOpt !== 'fit') {
                    pageW = sizes[sizeOpt][0]; pageH = sizes[sizeOpt][1];
                }

                const page = pdfDoc.addPage([pageW, pageH]);
                
                const scale = Math.min((pageW - margin*2) / img.width, (pageH - margin*2) / img.height);
                const scaledW = img.width * scale;
                const scaledH = img.height * scale;
                
                page.drawImage(img, {
                    x: (pageW - scaledW) / 2,
                    y: (pageH - scaledH) / 2,
                    width: scaledW, height: scaledH
                });
            }

            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, "images_converted.pdf");
        }

        function download(data, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
