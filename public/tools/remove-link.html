<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Links from PDF – Delete Hyperlinks Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/remove-link" />
    <meta name="description" content="Remove all hyperlinks and URLs from a PDF document online. Clean up links before sharing. Free and browser-based.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23f43f5e'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #f43f5e; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        .container { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .upload-box { border: 2px dashed var(--border); padding: 60px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 500px; }
        input { display: none; }
        .btn { margin-top: 20px; padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">Back to Home</a><div>Remove Links</div></header>
    <div class="container">
        <div class="upload-box" id="zone"><h1>Remove Hyperlinks</h1><p style="color:var(--muted)">Deletes all link annotations</p><input type="file" id="input" accept=".pdf"></div>
        <button class="btn" id="proc" style="display:none" onclick="clean()">Clean Links</button>
    </div>
    <script>
        const { PDFDocument } = PDFLib;
        const zone = document.getElementById('zone');
        const input = document.getElementById('input');
        const proc = document.getElementById('proc');

        zone.onclick = () => input.click();
        input.onchange = async (e) => {
            if(!e.target.files[0]) return;
            proc.style.display = 'inline-block';
        };

        async function clean() {
            const file = document.getElementById('input').files[0];
            const buffer = await file.arrayBuffer();
            const pdfDoc = await PDFDocument.load(buffer);
            
            const pages = pdfDoc.getPages();
            pages.forEach(page => {
                const annotations = page.node.Annots();
                if(annotations) {
                    // Access the array object
                    const annotsArray = annotations.asArray();
                    // Note: Modifying arrays during iteration is tricky.
                    // Instead, we create a new context and strip annotations on save usually.
                    // Simpler hack: Delete the 'Annots' entry
                    page.node.delete(PDFLib.Name.of('Annots'));
                }
            });

            const bytes = await pdfDoc.save();
            download(bytes, "links_removed.pdf");
        }

        function download(data, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data])); a.download = name; a.click(); }
    </script>
</body>
</html>
