<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert single or multi-page TIFF files to PDF online. Batch convert multiple TIFFs into one PDF. Free and browser-based.">
    <title>TIFF to PDF – Convert TIFF Images to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/tiff-to-pdf" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%238b5cf6'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #8b5cf6; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: var(--bg-card); padding: 30px; border-radius: 16px; text-align: center; }
        h2 { margin-top: 0; }
        .upload-box { border: 2px dashed var(--border); padding: 40px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        input { display: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Images to PDF</h2>
        <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>Select Images (JPG, PNG, TIFF)</p>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <button class="btn" id="createBtn" style="display:none" onclick="create()">Create PDF</button>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const createBtn = document.getElementById('createBtn');
        let files = [];

        fileInput.onchange = (e) => {
            files = Array.from(e.target.files);
            dropZone.innerHTML = `<h3>${files.length} files selected</h3>`;
            createBtn.style.display = 'block';
        };

        async function create() {
            const doc = await PDFDocument.create();
            
            for(const file of files) {
                const buffer = await file.arrayBuffer();
                let img;
                if(file.type === 'image/png') img = await doc.embedPng(buffer);
                else img = await doc.embedJpg(buffer); // Assuming JPEG for others
                
                const page = doc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }
            
            const bytes = await doc.save();
            download(bytes, "images.pdf");
        }

        function download(data, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
