<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert HEIC photos from iPhone to PDF online. Fast conversion, no quality loss. Free and works in your browser.">
    <title>HEIC to PDF – Convert iPhone Photos to PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/heic-to-pdf" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%2364748b'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #64748b; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: var(--bg-card); padding: 30px; border-radius: 16px; text-align: center; }
        h2 { margin-top: 0; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        input[type="file"] { display: none; }
        .status { margin-top: 15px; color: var(--muted); font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>HEIC to PDF</h2>
        <p style="color:var(--muted)">Convert iPhone photos</p>
        <button class="btn" onclick="document.getElementById('fileInput').click()">Select HEIC</button>
        <input type="file" id="fileInput" accept="image/heic">
        <div class="status" id="status"></div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            status.textContent = "Converting HEIC...";
            
            try {
                // 1. Convert HEIC to PNG/JPEG Blob
                const blob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.9 });
                const arrayBuffer = await blob.arrayBuffer();
                
                // 2. Create PDF
                const doc = await PDFDocument.create();
                let img;
                if(blob.type === 'image/png') img = await doc.embedPng(arrayBuffer);
                else img = await doc.embedJpg(arrayBuffer);
                
                const page = doc.addPage([img.width, img.height]);
                page.drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                
                const pdfBytes = await doc.save();
                download(pdfBytes, "converted.pdf");
                status.textContent = "Done!";
            } catch(err) {
                console.error(err);
                status.textContent = "Error converting file.";
            }
        };

        function download(data, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = name;
            a.click();
        }
    </script>
</body>
</html>
