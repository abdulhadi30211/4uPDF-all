<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Use your camera to scan and convert documents directly to PDF online. Auto-enhances scan quality. Free and fast.">
    <title>PDF Scanner Tool – Document to PDF Scanner | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-scanner" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23f59e0b'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #f59e0b; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 20; padding: 12px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; font-size: 18px; }
        
        video { width: 100%; height: 100vh; object-fit: cover; }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 20; }
        
        .btn-capture { width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; background: transparent; cursor: pointer; position: relative; }
        .btn-capture::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: white; border-radius: 50%; }
        
        .thumbs { display: flex; gap: 8px; max-width: 40%; overflow-x: auto; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; flex-shrink: 0; }
        .thumb.active { border-color: var(--accent); }
        
        .btn-action { padding: 10px 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: var(--border); color: var(--text); }
        
        #startScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; text-align: center; padding: 20px; }
        #startScreen input { display: none; }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="startScreen">
        <h1 style="font-size: 32px; margin-bottom: 10px;">PDF Scanner</h1>
        <p style="color:var(--muted); margin-bottom: 30px;">Use your camera to create a PDF instantly</p>
        <button class="btn-action" onclick="startCamera()">Start Camera</button>
    </div>

    <!-- Camera View -->
    <video id="video" autoplay playsinline></video>
    
    <header style="display:none;" id="header">
        <a href="index.html" class="logo">4uPDF-all Scanner</a>
        <button class="btn-action" id="saveBtn" onclick="savePdf()">Save PDF</button>
    </header>

    <div class="controls" style="display:none;" id="controls">
        <div class="thumbs" id="thumbList"></div>
        <button class="btn-capture" onclick="snap()"></button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const { PDFDocument } = PDFLib;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startScreen = document.getElementById('startScreen');
        const header = document.getElementById('header');
        const controls = document.getElementById('controls');
        const thumbList = document.getElementById('thumbList');
        
        let photos = [];
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                startScreen.style.display = 'none';
                header.style.display = 'flex';
                controls.style.display = 'flex';
            } catch(err) {
                alert("Could not access camera. Please allow permission.");
            }
        }

        function snap() {
            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Add to array
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            photos.push(dataUrl);
            
            // Add Thumb
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'thumb';
            thumbList.appendChild(img);
            
            // Scroll to latest
            thumbList.scrollLeft = thumbList.scrollWidth;
        }

        async function savePdf() {
            if(photos.length === 0) return alert("Take some photos first!");
            
            header.innerHTML = "Processing...";
            const pdfDoc = await PDFDocument.create();

            for(const dataUrl of photos) {
                const imgBytes = await fetch(dataUrl).then(res => res.arrayBuffer());
                const img = await pdfDoc.embedJpg(imgBytes);
                const page = pdfDoc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }

            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, "scanned.pdf");
            
            // Reset
            photos = [];
            thumbList.innerHTML = '';
            header.innerHTML = `<a href="index.html" class="logo">4uPDF-all</a><button class="btn-action" onclick="savePdf()">Save PDF</button>`;
        }

        function download(data, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
