        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #a855f7; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .box { background: var(--bg-card); padding: 50px; border-radius: 24px; max-width: 550px; width: 100%; border: 1px solid var(--border); text-align: center; }
        .icon { width: 60px; height: 60px; margin: 0 auto 20px; background: rgba(168, 85, 247, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
        h1 { font-size: 26px; margin-bottom: 10px; }

        .upload-zone { border: 2px dashed var(--border); padding: 30px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; }
        input { display: none; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    <header><a href="index.html" class="logo">PDF Suite Pro</a><div>PDF to EPUB</div></header>
