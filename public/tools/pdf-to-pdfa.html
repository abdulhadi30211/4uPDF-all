<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert PDF files to PDF/A format for long-term archiving and compliance. Free, browser-based conversion tool.">
    <title>PDF to PDF/A – Convert PDF to Archival Format Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-to-pdfa" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23a855f7'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #a855f7; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: var(--bg-card); padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; text-align: center; }
        h2 { margin-bottom: 10px; }
        p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
        .btn { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        input { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>PDF Archive (PDF/A)</h2>
        <p>Prepares your PDF for long-term archiving. Removes scripts, encryption, and unnecessary features.</p>
        
        <div style="margin-bottom:20px;">
            <button class="btn" style="background:var(--border); color:white" onclick="document.getElementById('fileInput').click()">Select PDF</button>
        </div>
        <button class="btn" id="convertBtn" style="display:none" onclick="createArchive()">Create Archive PDF</button>
        <input type="file" id="fileInput" accept=".pdf">
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        let pdfBytes = null;

        fileInput.onchange = async (e) => {
            const arrayBuffer = await e.target.files[0].arrayBuffer();
            pdfBytes = new Uint8Array(arrayBuffer);
            convertBtn.style.display = 'inline-block';
        };

        async function createArchive() {
            const srcDoc = await PDFDocument.load(pdfBytes);
            const newDoc = await PDFDocument.create();
            
            // Copy pages (resets internal structure)
            const pages = await newDoc.copyPages(srcDoc, srcDoc.getPageIndices());
            pages.forEach(p => newDoc.addPage(p));
            
            // Clean Metadata
            newDoc.setTitle("Archived Document");
            newDoc.setAuthor("");
            newDoc.setSubject("");
            newDoc.setKeywords([]);
            newDoc.setProducer("4uPDF-all Archiver");
            newDoc.setCreator("4uPDF-all");
            
            // Remove Encryption/Permissions (implicit by creating new doc)
            
            // Force PDF version 1.4 or similar for broad compatibility
            // pdf-lib automatically handles basic structure.
            
            const pdfBytes = await newDoc.save();
            download(pdfBytes, "archive.pdf");
        }

        function download(data, filename) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data]));
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
