<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Extract plain text from any PDF file online. OCR support for scanned PDFs. Fast, free and 100% browser-based.">
    <title>PDF to Text – Extract Text from PDF Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-to-txt" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%2306b6d4'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #06b6d4; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 600px; background: var(--bg-card); padding: 30px; border-radius: 16px; text-align: center; }
        h2 { margin-top: 0; }
        
        textarea { width: 100%; height: 200px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 15px; font-family: monospace; resize: vertical; margin: 20px 0; }
        
        .btn { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 5px; }
        input { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>PDF to Text</h2>
        <button class="btn" style="background:var(--border)" onclick="document.getElementById('fileInput').click()">Select PDF</button>
        <input type="file" id="fileInput" accept=".pdf">
        
        <textarea id="output" placeholder="Extracted text will appear here..." readonly></textarea>
        
        <button class="btn" id="downloadBtn" style="display:none" onclick="download()">Download TXT</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const downloadBtn = document.getElementById('downloadBtn');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            output.value = "Processing...";
            
            const buffer = await file.arrayBuffer();
            const doc = await pdfjsLib.getDocument({ data: buffer }).promise;
            let fullText = "";
            
            for(let i=1; i<=doc.numPages; i++) {
                const page = await doc.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += `--- Page ${i} ---\n${pageText}\n\n`;
            }
            
            output.value = fullText;
            downloadBtn.style.display = 'inline-block';
        };

        function download() {
            const text = output.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'extracted_text.txt';
            a.click();
        }
    </script>
</body>
</html>
