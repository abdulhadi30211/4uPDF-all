<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Listen to PDF documents read aloud with text-to-speech. Supports multiple voices and languages. Free online tool.">
    <title>Text to Speech PDF – Read PDF Aloud Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/speech" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%2310b981'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --accent: #10b981; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 12px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        
        canvas { margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.5); background: white; }
        
        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">4uPDF-all</a><div>TTS Reader</div></header>
    
    <div class="main">
        <div class="sidebar">
            <button class="btn" style="background:var(--border); color:white" onclick="document.getElementById('fileInput').click()">Open PDF</button>
            <input type="file" id="fileInput" accept=".pdf">
            
            <div style="margin-top:20px;">
                <label>Speed</label>
                <input type="range" min="0.5" max="2" step="0.1" value="1" id="rate">
            </div>
            
            <div class="controls">
                <button class="btn" onclick="play()">▶ Play</button>
                <button class="btn" style="background:var(--border); color:white" onclick="window.speechSynthesis.cancel()">Stop</button>
            </div>
        </div>
        
        <div class="content" id="contentArea">
            <h2 style="text-align:center; margin-top:100px; color:var(--muted)">Open a PDF to start reading</h2>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const fileInput = document.getElementById('fileInput');
        const contentArea = document.getElementById('contentArea');
        let fullText = "";
        let currentPage = 1;
        let totalPages = 0;

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            const buffer = await file.arrayBuffer();
            const doc = await pdfjsLib.getDocument({ data: buffer }).promise;
            totalPages = doc.numPages;
            fullText = "";
            contentArea.innerHTML = "";
            
            for(let i=1; i<=doc.numPages; i++) {
                const page = await doc.getPage(i);
                const viewport = page.getViewport({ scale: 1.2 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                contentArea.appendChild(canvas);
                
                // Extract text
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(s => s.str).join(' ');
                fullText += pageText + " ";
            }
        }

        function play() {
            if(!fullText) return alert("Load PDF first");
            
            const utterance = new SpeechSynthesisUtterance(fullText);
            utterance.rate = parseFloat(document.getElementById('rate').value);
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
