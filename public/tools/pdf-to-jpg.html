<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG – Convert PDF to JPG Images Free | 4uPDF</title>
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://4updf-all.vercel.app/pdf-to-jpg" />
    <meta name="description" content="Convert PDF pages to JPG images online for free. High-quality output, adjustable resolution, instant download. No signup required.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Cpath d='M8 6h10l6 6v14a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z' fill='%23eab308'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0f172a; --bg-card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #eab308; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { color: var(--accent); text-decoration: none; font-weight: 700; }
        .container { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .upload-box { border: 2px dashed var(--border); padding: 60px; border-radius: 16px; cursor: pointer; width: 100%; max-width: 500px; text-align: center; }
        input { display: none; }
        .btn { margin-top: 20px; padding: 12px 24px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">Back to Home</a><div>PDF to JPG</div></header>
    <div class="container">
        <div class="upload-box" id="zone"><h1>Convert PDF to JPG</h1><input type="file" id="input" accept=".pdf"></div>
        <div id="results" style="margin-top:20px;"></div>
        <button class="btn" id="dl" onclick="downloadAll()">Download ZIP</button>
    </div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const zone = document.getElementById('zone');
        const input = document.getElementById('input');
        const results = document.getElementById('results');
        const dl = document.getElementById('dl');
        let zip = null;

        zone.onclick = () => input.click();
        input.onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            results.innerHTML = '<p style="color:var(--muted)">Converting...</p>';
            zip = new JSZip();
            
            const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
            for(let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                // Convert to JPG (dataURL)
                const jpgData = canvas.toDataURL('image/jpeg', 0.9);
                zip.file(`page-${i}.jpg`, jpgData.split(',')[1], {base64: true});
                
                const img = document.createElement('img');
                img.src = jpgData;
                img.style.maxWidth = '120px';
                img.style.margin = '5px';
                img.style.borderRadius = '4px';
                results.appendChild(img);
            }
            dl.style.display = 'inline-block';
        };

        async function downloadAll() {
            const content = await zip.generateAsync({type: 'blob'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = 'jpg_images.zip';
            a.click();
        }
    </script>
</body>
</html>
